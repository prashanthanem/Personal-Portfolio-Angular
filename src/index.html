<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Prashanth Anem - Senior Software Engineer & Web Developer</title>
    <meta
      name="description"
      content="Portfolio of Prashanth Anem - Senior Software Engineer specializing in web development. Experienced in Angular, React, Node.js, and full-stack development. View my projects, skills, and expertise."
    />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="icon.ico" />

    <!-- Critical CSS inlined for fast initial render -->
    <style>
      /* Critical CSS - Only essential styles for initial render */
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell',
          'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #161616;
        color: #ffffff;
      }

      /* Essential Bootstrap classes for initial layout */
      .container {
        width: 100%;
        padding-right: 15px;
        padding-left: 15px;
        margin-right: auto;
        margin-left: auto;
      }

      @media (min-width: 576px) {
        .container {
          max-width: 540px;
        }
      }

      @media (min-width: 768px) {
        .container {
          max-width: 720px;
        }
      }

      @media (min-width: 992px) {
        .container {
          max-width: 960px;
        }
      }

      @media (min-width: 1200px) {
        .container {
          max-width: 1140px;
        }
      }

      .container-fluid {
        width: 100%;
        padding-right: 15px;
        padding-left: 15px;
        margin-right: auto;
        margin-left: auto;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        margin-right: -15px;
        margin-left: -15px;
      }

      .col-md-4,
      .col-md-8 {
        position: relative;
        width: 100%;
        padding-right: 15px;
        padding-left: 15px;
      }

      @media (min-width: 768px) {
        .col-md-4 {
          flex: 0 0 33.333333%;
          max-width: 33.333333%;
        }

        .col-md-8 {
          flex: 0 0 66.666667%;
          max-width: 66.666667%;
        }
      }

      /* Navbar critical styles */
      .navbar {
        position: relative;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        padding-top: 0.5rem;
        padding-bottom: 0.5rem;
      }

      .navbar-dark .navbar-brand {
        color: rgba(255, 255, 255, 0.9);
      }

      .navbar-brand {
        font-size: 1.25rem;
        font-weight: 500;
        text-decoration: none;
      }

      .fixed-top {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 1030;
      }

      .bg-dark {
        background-color: #212529 !important;
      }

      /* Essential spacing */
      .py-4 {
        padding-top: 1.5rem !important;
        padding-bottom: 1.5rem !important;
      }

      .py-5 {
        padding-top: 3rem !important;
        padding-bottom: 3rem !important;
      }

      .p-3 {
        padding: 1rem !important;
      }

      /* Text utilities */
      .fw-semibold {
        font-weight: 600 !important;
      }

      .fw-bold {
        font-weight: 700 !important;
      }

      .display-5 {
        font-size: 3rem;
        font-weight: 300;
        line-height: 1.2;
      }

      .fs-4 {
        font-size: 1.375rem !important;
      }

      /* Background and text */
      .text-bg-dark {
        color: #fff !important;
        background-color: rgba(33, 37, 41, 1) !important;
      }

      .rounded-3 {
        border-radius: 0.75rem !important;
      }

      /* Image utilities */
      .img-fluid {
        max-width: 100%;
        height: auto;
      }

      .object-fit-cover {
        object-fit: cover !important;
      }
    </style>

    <!-- Load Bootstrap asynchronously to prevent render blocking -->
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      />
    </noscript>
    <link rel="manifest" href="public/manifest.webmanifest" />
  </head>

  <body style="background-color: #161616">
    <app-root></app-root>
  </body>
</html>
